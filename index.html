<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Neuroeducativo - Estimulação Cognitiva</title>
    <style>
        :root {
            --bg-app: #f4f7fe;
            --bg-card: #ffffff;
            --text-main: #2d3748;
            --primary: #5c6bc0;
            --primary-hover: #4755b6;
            --accent-cyan: #26c6da;
            --accent-purple: #ab47bc;
            --correct-green: #2e7d32;
            --error-red: #c62828;
            --border-grid: #7986cb;
            --font-size-cell: 28px;
        }

        [data-theme="dark"] {
            --bg-app: #121826;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --primary: #7986cb;
            --primary-hover: #9fa8da;
            --accent-cyan: #4dd0e1;
            --accent-purple: #ba68c8;
            --border-grid: #9fa8da;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            max-width: 500px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        p.instructions {
            font-size: 1.2rem;
            line-height: 1.5;
        }

        .accessibility-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-acc {
            background: var(--bg-card);
            border: 2px solid var(--primary);
            color: var(--text-main);
            padding: 10px 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Grade do Sudoku Acessível (4x4 para experiência acolhedora e fluida) */
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            border: 4px solid var(--border-grid);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .cell {
            background: var(--bg-card);
            border: 1px solid #cbd5e1;
            font-size: var(--font-size-cell);
            font-weight: bold;
            text-align: center;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        .cell:focus {
            background: #e0f7fa;
            border: 3px solid var(--accent-cyan);
        }

        /* Linhas divisórias internas dos quadrantes 4x4 */
        .cell:nth-child(2n) { border-right: 3px solid var(--border-grid); }
        .cell:nth-child(md) { border-bottom: 3px solid var(--border-grid); }
        tr-row-2 .cell { border-bottom: 3px solid var(--border-grid); }
        
        /* Ajuste específico para as bordas do bloco 4x4 */
        .sudoku-grid input:nth-child(4n) { border-right: none; }
        .sudoku-grid input:nth-child(n+13) { border-bottom: none; }
        .sudoku-grid input:nth-child(5), 
        .sudoku-grid input:nth-child(6), 
        .sudoku-grid input:nth-child(7), 
        .sudoku-grid input:nth-child(8) {
            border-bottom: 3px solid var(--border-grid);
        }

        .cell.fixed {
            background: rgba(0, 0, 0, 0.04);
            color: var(--primary);
            cursor: not-allowed;
        }

        [data-theme="dark"] .cell.fixed {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-cyan);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-accent { background-color: var(--accent-purple); }
        .btn-full { grid-column: span 2; background-color: #718096; }

        .feedback {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            min-height: 40px;
            margin-top: 10px;
            padding: 10px;
            border-radius: 12px;
            width: 100%;
        }

        .feedback.success { color: var(--correct-green); background: #e8f5e9; }
        .feedback.error { color: var(--error-red); background: #ffebee; }
        .feedback.info { color: var(--primary); background: #e8eaf6; }

        /* Estilo idoso-friendly para aumentar tamanho da fonte */
        .large-text {
            --font-size-cell: 36px;
        }
        .large-text h1 { font-size: 2.6rem; }
        .large-text .instructions { font-size: 1.4rem; }
        .large-text .btn { font-size: 1.4rem; }

    </style>
</head>
<body>

    <header>
        <h1>Sudoku Neuroativo</h1>
        <p class="instructions">Complete a grade usando números de 1 a 4 sem repetir nas linhas, colunas ou blocos!</p>
    </header>

    <div class="accessibility-bar">
        <button class="btn-acc" onclick="toggleTheme()" aria-label="Alternar modo escuro">
            🌓 Modo Escuro
        </button>
        <button class="btn-acc" onclick="toggleTextSize()" aria-label="Aumentar tamanho do texto">
            aa+ Ampliar Fonte
        </button>
    </div>

    <main class="main-card">
        <div class="sudoku-grid" id="sudoku-board">
            </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="verifyGame()">✅ Verificar</button>
            <button class="btn btn-accent" onclick="getHint()">💡 Dica</button>
            <button class="btn btn-full" onclick="initGame()">🔄 Reiniciar Jogo</button>
        </div>

        <div id="feedback-message" class="feedback"></div>
    </main>


</body>
</html>
